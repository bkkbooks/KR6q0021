body:
  text: 卷六十一曹洞宗青原下十八世鹿門覺禪師法嗣普照寺一辨禪師直翁舉禪師法嗣天童雲外岫禪師青原下十九世普照辨禪師法嗣大明寶禪師慈雲十身覺禪師通玄菴圓通禪師普照寶禪師天童岫禪師法嗣雪竇無印大證禪師青原下第二十世大明寶禪師法嗣王山體禪師仁山恒禪師普照寶禪師法嗣虗明教亨禪師青原下第二十一世王山體禪師法嗣大明雪巖滿禪師慶壽勝默光禪師仁山恒禪師法嗣大明詮禪師慶壽亨禪師法嗣大覺西溪弘相禪師青原下第二十二世雪巖滿禪師法嗣萬松行秀禪師竹林巨川海禪師青原下第二十三世報恩秀禪師法嗣少室雪庭福裕禪師報恩林泉從倫禪師五捨從寬禪師全一至溫禪師少林法王圓照禪師丞相移剌真卿居士楚材屏山李純甫居士僊巖德禪師法嗣弘明虗照禪師青原下第二十四世少室裕禪師法嗣少室靈隱文泰禪師中林智泰禪師靈巖足菴淨肅禪師和林北寺覺印禪師昭覺仲慶禪師太子久善禪師長慶德鉁禪師平水慧圓禪師京兆華嚴覺印禪師鞏昌廣嚴法興禪師順德妙乘禪師報恩倫禪師法嗣鞍山月泉同新禪師法王照禪師法嗣西安彬禪師十方進禪師嵩山法王暉禪師靈巖復禪師護國圓禪師崇孝普禪師淨土里禪師寶應海禪師天寧明禪師法嗣天寧仲復子顏禪師太保劉秉忠居士青原下第二十五世少室泰禪師法嗣寶應還源福遇禪師靈巖秋江潔禪師靈巖肅禪師法嗣寶應月嵓永達禪師古嵓普就禪師青原下第二十六世寶應遇禪師法嗣香嚴淳拙文材禪師熊耳空相珪禪師嵩山龍潭深禪師嵩山龍潭端禪師洛陽天慶江禪師嵩山永泰祥禪師靈巖潔禪師法嗣雪軒道成禪師寶應達禪師法嗣光山石盤山遇禪師太原斌禪師封龍就禪師法嗣息菴義讓禪師泰山靈巖容禪師晉寧心菴主白茅春菴主青原下第二十七世少室才禪師法嗣松庭子嚴禪師嵩山竹菴子忍禪師佛巖稔禪師登封華嚴遇禪師古蔡元禪師熊耳登禪師天慶讓禪師法嗣熊耳山崧溪子定禪師靈谷舜都宗禪師空杏偉禪師廣平實禪師空相珪禪師法嗣天寧壽禪師天寧才禪師南陽維摩懷禪師雒陽天慶能禪師安國仁禪師韶陽雲門憨禪師遼州定禪師解州沿禪師曜州顯禪師青原下第二十八世萬安嚴禪師法嗣少室凝然了改禪師青原下第二十九世少室改禪師法嗣少室俱空契斌禪師青原下第三十世少室斌禪師法嗣無方可從禪師青原下第三十一世定國從禪師法嗣少室月舟文載禪師青原下第三十二世少室載禪師法嗣小山宗書禪師顯慶𥌓菴悟寅禪師青原下第三十三世宗鏡書禪師法嗣少室幻休常潤禪師廩山蘊空常忠禪師卷六十二青原下第三十四世少室潤禪師法嗣慈舟方念禪師少室無言正道禪師廩山忠禪師法嗣壽昌無明慧經禪師青原下第三十五世大覺禪師法嗣雲門湛然圓燈禪師少室道禪師法嗣少室心悅慧喜禪師壽昌經禪師法嗣博山無異元來禪師東苑晦臺元鏡禪師壽昌閴然元謐禪師鼓山永覺元賢禪師祠部黃端伯居士青原下第三十六世雲門澄禪師法嗣苕溪指南明徹禪師明因麥浪明懷禪師佛日石雨明方禪師顯聖三宜明盂禪師卷六十三青原下第三十六世雲門澄禪師法嗣東山爾密明澓禪師具足明有禪師百丈瑞白明雪禪師雁田柳湞居士葉曇茂居士博山來禪師法嗣灜山雪關智誾禪師檀度嵩乳道密禪師長慶宗寶道獨禪師獨峯竹山道嚴禪師迴龍古航道舟禪師博山雪磵道奉禪師開府集生余大成居士冶父星朗雄禪師東苑晦臺鏡禪師法嗣天界覺浪道盛禪師鼓山永覺賢禪師法嗣開元為霖道霈禪師少室喜禪師法嗣彼岸涵宇海寬禪師安國別山性在禪師
