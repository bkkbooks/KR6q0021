body:
  text: 卷四十一南嶽下第十一世石霜圓禪師法嗣楊岐方會禪師南嶽下第十二世楊岐會禪師法嗣白雲守端禪師保寧仁勇禪師石霜守孫禪師茶陵定林寺郁山主比部孫居士南嶽下第十三世白雲端禪師法嗣五祖法演禪師雲蓋山智本禪師琅琅永起禪師崇勝院珙禪師提刑郭祥正淨空居士保寧勇禪師法嗣壽聖智淵禪師壽聖院楚文禪師寶積宗映禪師景福日餘禪師上方日益禪師西堂顯首座卷四十二南嶽下第十四世五祖演禪師法嗣昭覺佛果克勤禪師佛鑑慧勤禪師龍門佛眼清遠禪師開福道寧禪師大隨南堂元靜禪師無為宗泰禪師五祖表自禪師龍華道初禪師九頂清素禪師元禮首座普融知藏法閦上座雲蓋本禪師法嗣承天自賢禪師承天慧連禪師香山惟德禪師巖治平慶禪師琅琊起禪師法嗣俞道婆卷四十三南嶽下第十五世昭覺勤禪師法嗣虎丘紹隆禪師宗杲大慧普覺禪師佛智端禪師佛性法泰禪師此庵景元禪師玄沙僧昭禪師南峯雲辨禪師惠遠佛海禪師鴻福子文禪師正法建禪師華藏密印安民禪師昭覺徹庵道元禪師堂中仁禪師象耳山袁覺禪師華嚴祖覺禪師福嚴文演禪師西山明因曇玩禪師虎丘雪庭元淨禪師天寧訥堂梵思禪師君山佛照覺禪師寶華賢禪師東山覺禪師天封覺禪師昭覺道祖首座雲居宗振首座樞密徐俯東湖居士不列章次郡王趙令襟超然居士侍郎李彌遜普現居士覺庵道人令人本明范縣君太平勤禪師法嗣文殊心道禪師南華知昺禪師龍牙智才禪師蓬萊卿禪師何山佛燈守珣禪師泐潭擇明禪師寶藏本禪師祥符清海禪師佛真了禪師谷山海禪師卷四十四南嶽下第十五世龍門遠禪師法嗣龍翔竹庵士圭禪師雲居高庵善悟禪師西禪文璉禪師黃龍牧庵法忠禪師烏巨雪堂道行禪師白楊法順禪師雲居法如禪師歸宗真牧正賢禪師道場正堂明辨禪師方廣深禪師世奇首座淨居尼慧溫禪師給事馮楫濟川居士開福寧禪師法嗣月庵善果禪師大隨靜禪師法嗣石頭自回禪師護聖愚丘居靜禪師南巖勝禪師梁山廓庵師遠禪師土溪智陀子言庵主劒門南修道者莫將尚書龍圖王蕭居士五祖自禪師法嗣龍華高禪師卷四十五南嶽下第十六世虎丘隆禪師法嗣天童應庵曇華禪師徑山杲禪師法嗣教忠晦庵彌光禪師東林道顏禪師西禪懶庵鼎需禪師東禪蒙庵恩嶽禪師西禪此庵守淨禪師開善道謙禪師育王佛照德光禪師華藏遁庵宗演禪師天童無用淨全禪師大溈法寶禪師玉泉曇懿禪師薦福悟本禪師育王大圓遵璞禪師能仁枯木祖元禪師靈崖東庵了性禪師蔣山一庵善直禪師萬壽自護禪師大溈了庵景暈禪師靈隱誰庵了演禪師光孝寺致遠禪師崇聖普慈蘊聞禪師連雲道能禪師靈隱最庵道印禪師竹原宗元庵主近禮侍者徑山了明禪師淨居尼妙道禪師資壽尼無著妙總禪師侍郎無垢居士張九成參政李邴居士寶學劉彥修居士提刑吳明偉居士門司黃彥節居士秦國夫人計氏法真卷四十六南嶽下第十六世育王禪師法嗣清涼坦禪師淨慈水庵師一禪師道場無庵法全禪師延福寒巖慧升禪師大溈泰禪師法嗣慧通清旦禪師靈巖仲安禪師正法灝禪師昭覺辨禪師護國元禪師法嗣國清簡堂行機禪師焦山或庵師體禪師華藏湛堂智深禪師上竺證悟智圓禪師參政錢端禮居士靈隱遠禪師法嗣東山全庵齊己禪師疏山歸雲如本禪師日本睿山覺阿上人淨慈濟顛道濟禪師內翰曾開居士知府葛郯居士華藏民禪師法嗣徑山別峰寶印禪師昭覺元禪師法嗣鳳棲慧觀禪師文殊道禪師法嗣楚安慧方禪師文殊思業禪師何山珣禪師法嗣義烏稠巖了贇禪師待制潘良貴居士泐潭明禪師法嗣無為隨菴守緣禪師龍翔圭禪師法嗣雲居頑菴德升禪師狼山蘿庵慧溫禪師雲居悟禪師法嗣雙林德用禪師萬年無著道間禪師中際善能禪師雲居普雲自圓禪師烏巨行禪師法嗣薦福退庵休禪師長蘆且庵仁禪師白楊順禪師法嗣青源殊禪師雲居如禪師法嗣隱靜圓極彥岑禪師報恩成禪師道場辨禪師法嗣覺報清禪師何山然首座黃龍忠禪師法嗣信相戒修禪師普庵印肅禪師西禪璉禪師法嗣西禪第二代希秀禪師淨居尼溫禪師法嗣淨居尼無相法燈禪師大溈果禪師法嗣玉泉窮谷宗璉禪師大溈行禪師道林淵禪師大洪老衲祖證禪師泐潭山堂德淳禪師保安復庵可封禪師石亭野庵祖禪師石霜宗鑒禪師報恩文爾禪師石頭回禪師法嗣雲居蓬庵德會禪師卷四十七南嶽下第十七世天童華禪師法嗣天童密菴咸傑禪師光孝百拙善燈禪師南書記侍郎李浩居士附鬻胭脂者教授嚴朝康居士教忠光禪師法嗣法石中菴慧空禪師淨慈混源曇密禪師青原信菴唯禋禪師東林顏禪師法嗣公安遁菴祖珠禪師報恩法演禪師淨慈肯堂彥充禪師智者元菴真慈禪師昭覺紹淵禪師徽州簡上座資福遂翁處良禪師西禪需禪師法嗣鼓山木菴安永禪師龍翔柏堂南雅禪師天王志清禪師劒門安分菴主東禪嶽禪師法嗣鼓山宗逮禪師鼓山石菴知玿禪師徑山寓菴德灊禪師西禪淨禪師法嗣乾元鈍菴宗頴禪師華嚴別峰雲禪師中濟無禪立才禪師開善謙禪師法嗣仙州山吳十三道人育王光禪師法嗣靈隱妙峰之善禪師淨慈北㵎居簡禪師徑山浙翁如琰禪師上方朴翁銛禪師東禪性空觀禪師育王孤雲權禪師育王秀巖師瑞禪師淨慈退谷義雲禪師育王空叟宗印禪師鍾山鐵牛印禪師天童無際了派禪師石菴正玸禪師天童海門師齊禪師雲居率菴梵琮禪師華藏演禪師法嗣何山月窟慧清禪師天童全禪師法嗣育王笑翁妙堪禪師靈隱石鼓希夷禪師雪竇野雲處南禪師雪峰滅堂了宗禪師盤山思卓禪師丞相錢象祖居士雪峰然禪師法嗣如如顏丙居士育王璞禪師法嗣育王妙智廓禪師淨慈一禪師法嗣天童息菴達觀禪師仰山簡菴嗣清禪師道場全禪師法嗣華藏伊菴有權禪師徑山印禪師法嗣金山道奇禪師蓬菴自聞永聰禪師焦山體禪師法嗣天童癡鈍智頴禪師雙林用禪師法嗣三峯印禪師龜峰光禪師法嗣徑山蒙菴元聰禪師大溈行禪師法嗣德山子涓禪師大洪證禪師法嗣萬壽月林師觀禪師雲居會禪師法嗣萬松壞衲大璉禪師
