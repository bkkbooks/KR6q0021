front:
  text: 也間嘗流覽釋氏之書立教雖主於空寂而其戒欺去妄蠲忿窒欲亦與勸善懲惡之道蓋無殊指焉自宗門教興曹溪而下五派迭衍各有撰述宋景德以後裒集為傳燈諸録嗣是又舉挈要領彚成一編是為五燈會元洎乎本朝沙門海寬念其支派繁衍自宋金元明數百年來傳述闕然乃著纘續一書今聖感寺僧超永復慮譜牒漸棼聞見不一用是旁搜博考折衷於二編而參訂之刪其煩蕪增所未備以成全書其用心也可謂勤矣至於簡牘所載互相印證之語罕譬曲喻為説甚夥而其大指要歸亦惟欲祛迷惑以復性真不越乎間邪存誠牗人為善之意匪僅有裨於禪宗教旨而已也故為之序康熙三十二年四月二十五日五燈全書目序恭惟盛朝開國以來國家之治超於三代凡事關教化咸與闡揚僧史傳燈之録雖方外要典亦當以時修明也永因念從上慧命所繫於是頓忘固陋自康熙癸亥入京廣徵博採謹以古今遺集探其事實其理不當而言冗偽者則刪之其旨不二而機冥合者則增之繼而考訂宗派申明大端不使金鍮溷雜務期支緒詳明引説辨解各有根據靡不窮搜極討編成垂二百餘萬言名曰五燈全書遭遇聖天子以至道慈德治天子天地萬物清寧安裕而佛教得以毗贊大化雖古之帝王未有如皇上之啓牖生民欲其回心嚮道如此之切也永所以勤勤懇懇不避冒犯輒敢以其書上進幸於萬幾之暇得經御覽辨正差謬恩賜序文天章雲燦睿藻波騰外核六經內該三藏使千燈互映託宸撰而彌彰萬類同歸荷綸音而愈徹豈直抑揚善惡昭晰儒禪鎔範四天垂規百代而已又蒙頒內府黎板命付剞劂永承旨勉力鳩工茲呈新刊御序并全書首卷聖覽甚悅手敕諭永曰御製序後當有自序凡例方好永慚惶無地敢不稽首揚言吾佛以正法眼為一大教之宗以不傳旨為一大教之祖其宗乃心性之道原生靈之妙諦也其祖乃定慧之大範朗悟之真驗也今上大聖垂覽茲編發揚儒佛合一之義以廣流通所謂聖人立教之道必聖人乃能行之是豈惟萬世佛氏之徒大幸也亦天下生民之大幸也夫敬為序康熙癸酉孟秋上浣八日聖感寺嗣祖沙門臣超永拜撰五燈全書序世出世間法其源多岐貴夫挈領提綱而善損益之提挈之要則宜取信於本法無取證於末流取信於佛説無取證於俗議而天下大中至正之理始躍然知發蒙振落周行無悖博照不偏亘古亘今闡呈真體所謂一大事因緣也如來以一大事因緣出現於世以正法要為一大教之宗密傳授為一大教之祖𮞏代相禪五燈薪接有由來矣讀其書徵其事或現圓機如波紋織沼或轟獅吼如絶壑奔雷醉心者甘勝醍醐誤觸者猛逾毒藥自書傳互異曖昧漶漫遂令疑而不信誵訛雜出魚目珠貝之不分是豈授受者有闕失歟抑亦紀載者之過也去聖時遙師承各袒匪具超方眼目運大公無我之心以貫串諸家廣嗣續而建綱宗亟搜剔而嚴去取幾何不日星晦而滄溟涸耶迦文於經教之外以無盡三昧授大龜氏二十八傳而至菩提達磨尊者按唐書後魏之末有僧達磨本天竺國王之子以護國出家入南海得禪宗妙法自釋迦文佛相傳衣鉢世為授受入梁隱於嵩山少林寺以其法傳慧可可傳僧粲粲傳道信信傳弘忍忍傳慧能能在中國於達磨為六世故世稱六祖其文蓋班班可考復念正法眼藏涅槃妙心可以語言發不可以語言到故末上特慎重拈花付囑之舉用以表明正法非同諂曲明教嵩之言曰正法者大教之所自出衆經之所自明也得乎此者雖以萬端言之其所言未始雜也不得乎此者雖絶言而守之其所守未始不惑也善説法要蓋無踰於明教矣今世法道下趨邪師輩出沉湎於勢利攘臂於鬬諍喔唯突譎之徒相與以佛為戲而語言文字一途昔用之揚扢宗要今用之嘬蝕獅身肩慧命之責者仰屋扼腕之不暇尚何所事於發揮揣摩以表彰從上之法式哉我深雪霽兄為之痛心發憤乃殫慮竭思經營鉛槧操三十年之苦心而全書脫藁蒙聖天子嘉漿再三壽剞劂有日矣於是祖道重光五燈復燦揆以椎魯暗識亦得搦不律以佐厥功更竊竊然踴躍歎美以附於孔門之遊夏焉夫道為天下之本書為天下之迹事為天下之異理為天下之同因迹以顯本折同以融異而上下古今無剩義矣非挈提綱領損益取證之明驗乎紫陽之論達磨為能盡翻窠臼倡為禪宗視義學尤為高妙固知別傳之旨常存世間以起緇素之篤信討論全藉楮墨以為證據宋季五燈並傳大川濟公會而梓之迄今又五百餘載嗣法者亡慮數千斷斷續續霽兄表而出之興滅繼絶心涵太虗豈如白巖之黨同伐異任生滅為筆削者哉述而不作竊比老彭知我罪我雖宣尼有所不免耳霽兄初結茆於永嘉之雲外峯八易寒暑刀耕火種謝絶人事全書經始於峯下道老人貽札殊深弗克告成之慮而今書竟成矣可以告老人於寂光矣揆昔叨老人之推愛極殷故附及序末以見著述卒業之難而霽兄仰承師訓輔教翊經其所存者廣其所見者大雖其習趨之端與儒或異而五燈建豎即易禮詩書春秋相表裏並行有如此也康熙壬申冬日北京玉泉山靜明園古華嚴寺沙門超揆撰五燈全書進呈奏疏聖感寺住持臣僧超永謹奏為進呈五燈全書事竊惟三教無二道聖人無兩心迹雖有世間方外之殊理原無修己利人之別第品類雜則羣言貴有折衷須流派清而根源斯為可據喜際同文之盛世敬集一家之成言非敢云塵露有益於山海之高深實仰藉聖明得照夫昏衢之日月茲蓋伏遇皇帝陛下心傳千聖道冠百王明目達聰而邇言猶察懸鞀設鐸而聞善則登萬方共仰有道之聖人四海久頌太平之天子臣僧超永忝預緇流幸依紫禁有懷莫報矢願靡他爰念佛起西乾祖傳東震以明心見性為宗以化惡從善為教修持則以六度為大乘原不離世間相而求實相取證則以參悟為要旨無非借方便言以表至言紀其系者往代尚有厥人接其枝者於今亟宜詳核臣僧不揣固陋用志十年歷稽從上之遺編搜索近今之宗派言無岐轍語合心燈西域則首七佛而𮞏授迦葉阿難中土則先達磨而沿流青原南嶽末附未詳法嗣間收應化聖賢閲時近三千年計人餘七千數一十有六卷標其目一百二十卷記其言雖識為五燈全書誠有待天心炳鑒為此彚寫冒昧進呈伏願不棄芻蕘俯垂釆擇如言堪繼後求循例允附龍藏之末函則派衍流長冀校訂一勒梨編以示遠臣僧又沐情諦觀前聖懿德有內典曾叨卷首綸音倘蒙恩賜序文更屬萬年盛典則法輪賴金輪以常轉舜日映佛日以增輝矣臣僧超永曷勝瞻天仰聖激切屏營之至謹具奏恭進以聞康熙參拾二年參月日臣僧超永五燈全書進呈奏疏二聖感寺住持臣僧超永謹奏為進呈五燈全書事竊惟化洽太和道含弘而廣大願垂上乘德普覆而平均敷善教以利民布慈心以育物恭逢盛典喜際昌時茲蓋伏遇皇帝陛下堯欽舜哲文獻武功聖學恆新撫萬而建極皇威遠播統六服以綏猷懸天鑑於域中運大權於寓內廓清沙漠全憑睿算之指揮尅定乾坤總屬神機之縱奪眷言匡護清祖系於禪林汲引培扶登蒼生於福地佛法賴隆盛世梵剎宏創興朝臣僧庸愚無似老邁難堪才異大川謬忝續燈之妄識乖明教愧叨寵賚之深前呈百二十卷全書早開七千餘僧正眼欽承綸命敬付梓工剞劂已得告成裝飾因而再貢茲緣此理重有干祈嚮蒙御製鴻文曾許頒入龍藏敢希允俞冒犯威嚴伏願聖德崔嵬永樹萬年基業天潢灝瀚總歸一派淵源禮備當今玉軸配錦函之貴事高曠古金輪鞏繡柱之尊景祚與七政相齊厚恩與二曜彌固矣臣僧超永曷勝瞻天仰聖激切屏營之至謹具奏恭進以聞康熙三十六年六月日臣僧超永五燈全書凡例燈史自傳聯普續廣五籍為禪門記載之書其行於世也久矣嗣後宋大川濟禪師病其卷帙浩繁事實未核於是刪偽定訛析疑傳信束為會元一書蓋有經有法有條有理於禪統法系不假考而明昭而著其有造於大道有功於學者甚大實天壤間一大典故尤非羣書可得而擬也從是五百年來顯晦不一五宗之統且止其三雖濟洞尚存亦非前此家風況近日譜牒紛更聞見益異若決江河安所底止直下兒孫凡有血氣者能無蒿目深憂乎永行愧先賢解慙往哲但念從上恩德碎身罔報乃於垂老之年曳踵行數千里謁告同人而商確此書共圖返古懸救方來矢公矢慎至正至詳敢曰樹天下萬世之防按列聖徽猷彚諸家法要考古徵今網羅上下窮神極慮竭智盡能法尚春秋之嚴式準會元之切亦頗顯幽闡微發前人未發之旨庶乎理長義就必有明哲知音共扶南董其倫序之次南嶽青原俱止三十七世天王於馬祖天皇於石頭皆前人所定之案見諸典藉不啻數十種悉從龍藏佛祖通載中原本根據庶令統系無差海舟慈祖是永非普是二非一奈彼迷惑謬見削我二世豈知慈加普者嗣萬峰沈貫銘中所及者是也慈加永者嗣東明翼善碑中符合者是也其理炳然更復何辨洞宗世系所紀不一今從永覺賢公之補燈遠門柱公之續略涵宇寬公之纘續為霖霈公之闢謬參酌以定匪涉私裁自宗分五派良由紹震旦之真燈然不面證一堂未許稱傳衣之嫡血即如薦福古偶觸紙上陳言遙繼雲門偃祖不止百有餘認為嗣法為己甚重為法甚輕紊亂道源開罪千古故敢列於未詳以明法統之不可或淆而承虗之不可覬幸雪嶠信老人久曰無傳存稿忽嗣司理黃端伯若端伯洞宗或收於無明慧經下或列於無異元來下殊無定準細考端伯歷敘來由畢竟嗣壽昌為當密祖行狀為山翁忞和尚所作嗣法十二位外從無枝節近存稿之增黃育祺寶積之入古雪哲未審何意況行狀寶積父子相承所著之書何不同如是兩公之不忍遺擬同元白可惟一潤山幢海諸公列於未詳僧摩居士馬一騰遍參諸方入處諦當唱道吳越燕楚之間士大夫中林太史增志張司農有譽熊給諫開元俱出其爐鞴所著儒禪合一之書等身亦士林所希有者補入未詳應化聖賢西天者列於二十八祖之末東土者集於南嶽青原之前庶見次序分明不致條理舛錯古今尊宿有録存者語俱另選不循舊文若無録可輯仍從燈元諸書取要刪繁所貴旨趣之切當五宗世系之名俱依諸譜所載但有傳記法言者取冠於前共不列章次者目録於後南嶽下三十五六七世青原下三十七世支分蕃衍一時難獲全璧茲則隨得隨録但從世次而弗拘嗣法之前後康熙甲子上元日檇李嗣祖沙門超永書於深雪草堂
