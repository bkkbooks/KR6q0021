body:
  text: 卷一百九曹洞宗青原下第三十七世隨録無迹淨敏禪師願菴淨伊禪師大鼎淨新禪師遠門淨柱禪師象田即念淨現禪師南山天愚淨寶禪師寶林深谷淨岑禪師翠巖午星淨炯禪師好木淨材禪師文峯樵之淨玉禪師界滋淨澤禪師來雲淨現禪師卷一百九補遺青原下第三十七世隨録濟生雪樵證禪師薦福石浪如禪師慵庵淨偉禪師卷一百十青原下第三十七世隨録白巖位中淨符禪師龍門樵風淨妙禪師光相至善淨得禪師保福九逵淨達禪師淨性柴仙淨陽禪師證果印如淨成禪師寶蓋峯大治淨鼎禪師慈雲俍亭淨挺禪師福勝一機淨瞬禪師宗鏡眉悉淨通禪師盟石淨息禪師多福妙叶淨啓禪師保寧端實淨嚴禪師崆洞不溢淨滿禪師卷一百十補遺青原下第三十七世隨録寶壽道曉悅禪師卷一百十一青原下第三十七世隨録獻公淨真禪師白雲鄰木淨時禪師東越西遁居士淨超法相坦持淨鎰禪師妙峰指源淨信禪師妙覺三立淨覺禪師佛日冰溪淨融禪師東塔為則淨範禪師慧日元木淨恆禪師天章鄰哲淨彥禪師水月菴法純淨慎禪師龍田拍子淨地禪師天寧休山淨炬禪師清涼三疾淨甫禪師龍山介眉淨傳禪師天華法聚淨理禪師津梁菴詹明淨純禪師卷一百十二青原下第三十七世隨録蜀阜東星淨鑑禪師普明石照淨燁禪師寧遠淨地禪師融光自聞淨音禪師清化唯岑淨嶾禪師放眉淨真禪師自若淨深禪師寶泉素端淨響禪師卷一百十二補遺青原下第三十七世隨録普賢疏庵淨禪師斗菴晦公雋禪師卷一百十三青原下第三十七世隨録龍華久默大音禪師青龍百愚淨斯禪師洞山孤崖淨聰禪師佛川離言淨義禪師金仙蕃光淨璨禪師雲巖元潔淨瑩禪師道林鏡愚淨慧禪師獅子巖中也淨慈禪師衍慶石鼓淨滋禪師卷一百十四青原下第三十七世隨録谷山金峯淨雲禪師西峰獅吼振淨禪師百丈石澗淨泐禪師本珠玥禪師護國眠石淨蘊禪師佛燈白嵓淨博禪師西山邃谷淨源禪師紫峰萬仞淨壁禪師夾山伴我淨侶禪師辨山玄素淨體禪師卷一百十四補遺青原下第三十七世隨録穀山如庵平禪師歐寧同凡聖禪師卷一百十五青原下第三十七世隨録樂平淑安淨周禪師破暗淨燈禪師道林離愚淨志禪師寶壽梵則淨律禪師葦渡淨蘆禪師本覺歷然淨相禪師資教浹水淨洽禪師曹山起元淨生禪師雲松淨品禪師丹溟淨幢禪師雲淙淨訥禪師卷一百十六青原下第三十七世隨録華嚴元錫弘恩禪師瀛山雲岫成巒禪師頭陀穎學弘敏禪師南庵大依禪師卓錫破崖弘繼禪師洪福靈焰大弘禪師歸宗天然函是禪師千山祖心函可禪師卷一百十七青原下第三十七世隨録竹源直指弘南禪師博山元祚弘裕禪師博山怡生弘喜禪師攝山竺菴大成禪師福山石潮大寧禪師大慈石公大禪師龍華梅逢大忍禪師卷一百十八青原下第三十七世隨録崇光觀濤大奇禪師安隱亭山大充禪師仰山千丈大英禪師青原墨歷大禪師壽昌其天大浩禪師弘濟方融如璽禪師天目思豫大聞禪師青原嘯峯天然禪師好山戒弘大伊禪師青原叶妙大權禪師西洞庭同岑大燈禪師冶父南洲月禪師冶父笠庵蔭禪師冶父松翁徠禪師冶父天濟柳禪師昭慶天目方禪師卷一百十九未詳法嗣實性大師中觀沼禪師僧肇法師禪月貫休禪師先淨照禪師公期和尚唐朝因禪師福州東山雲頂禪師婺州雲幽重惲師雙溪布衲如玉禪師舒州投子通禪師處州法海立禪師汝州天寧明禪師蜀中仁王欽禪師金陵鐵索山主樓子和尚神照本如法師上竺圓智證悟法師和州淨戒守密禪師本嵩律師老宿菴主等洪州大守宋令公江南相馮延官人道流僧俗等青州佛覺禪師圓通善國師慶壽元悟玉禪師黃山趙文孺居士高郵州定禪師徑山雲菴慶禪師竹林巨川海禪師雪峯樵隱悟逸禪師坱北和尚鎮州嘉山來禪師溈山太初禪師子範慧洪大師蔣山慧空元模禪師佛光道悟禪師普覺淳朋禪師雪竇常藏主台州黃巖覺真育王勉侍者鑷工張生德鄞之薦福承古禪師卷一百二十未詳法嗣永福靈江浩首座老素首座雁山羅漢寺證首座淨慈元菴會藏主天目一山魁菴主壽昌絶照輝禪師靈雲省菴思禪師文獻黃潛居士育王虗菴實首座天童幻菴住首座天童默中唯西堂宜興佛隴可上座九峯壽首座雲峯無盡祖燈禪師仙林寺雪庭禪師永寧古淵清禪師淮南祐上座聖壽宜翁可觀禪師白雲明星禪師佛妙禪師徑山傑峯英禪師徑山敬菴莊禪師待詔沈士榮居士雲棲蓮池袾宏大師紫拍達觀真可大師黃蘗無念深有禪師白馬寺儀峯方彖禪師鵝湖養菴心禪師曹溪憨山德清大師真寂聞谷廣印禪師破山洞聞法乘禪師翠巖古雪通哲禪師黃介子居士育祺僧摩居士馬一騰太史蔣虎臣居士泐潭元白可尊宿卷一百二十補遺未詳法嗣遍融真圓禪師妙峯福登禪師雲居顓愚觀衡禪師達澄受昭禪師青林如鑑老宿候
