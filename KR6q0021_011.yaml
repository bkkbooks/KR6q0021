body:
  text: 卷五十六南嶽下第二十世天童鑒禪師法嗣雪竇竺田汝霖禪師道場玉溪思珉禪師靈隱誾禪師法嗣東林無外宗廓禪師中竺有禪師法嗣石門真覺元翁信禪師風幡中禪師法嗣呂鐵船居士華藏見禪師法嗣金芝嶺鐵𭪿念禪師皖山凝禪師法嗣澱山蒙山德異禪師金牛真禪師法嗣太湖普明無用寬禪師直翁圓禪師法嗣天寧無能教禪師慶壽璋禪師法嗣大慶壽海雲印簡禪師南嶽下第二十一世徑山及禪師法嗣靈隱空叟欣悟禪師天龍斯道道衍禪師萬壽仁禪師法嗣徑山南石文琇禪師徑山銘禪師法嗣天寧西白力金禪師龍翔訴禪師法嗣天界覺原慧曇禪師天界全室宗泐禪師中竺懶翁庭俊禪師介庵用真輔良禪師圓通約之崇裕禪師寶相清遠懷渭禪師資聖克新仲銘禪師萬壽霖禪師法嗣道場孤峰明德禪師天池信禪師法嗣天寶鐵關法樞禪師大慈止巖成禪師蒙山異禪師法嗣孤舟濟禪師慈化鐵山瓊禪師太湖寬禪師法嗣龍池一源永寧禪師縉雲山如海真禪師天寧教禪師法嗣妙果竺源水盛禪師卷五十七南嶽下第二十二世雙林誾禪師法嗣徑山月江宗淨禪師西白金禪師法嗣保寧敏機覺慧禪師時菴敷禪師法嗣簡菴希古師頤禪師天界曇禪師法嗣靈谷定巖淨戒禪師天界泐禪師法嗣天童佛朗湛然自性禪師大隋無初德始禪師淨慈德禪師法嗣靈隱無文本禪師止巖成禪師法嗣烏石傑峰世愚禪師天寶樞禪師法嗣淨茲逆川智順禪師縉雲真禪師法嗣五臺碧峰寶金禪師薦嚴義禪師法嗣淨慈祖方道禪師慈化瓊禪師法嗣香嚴無聞思聰禪師玉峰寂照無極導禪師南嶽下第二十三世祖芳聯禪師法嗣普明立中成禪師淨慈照菴宗靜禪師烏石愚禪師法嗣瑞安太初啓原禪師靈谷無涯道永禪師南嶽下第二十五世牧菴謙禪師法嗣慈化普菴禪師卷五十八南嶽下第二十三世天目本禪師法嗣無明千巖元長禪師師子林天如惟則禪師日本建長古先印原禪師蒼山念菴圓護禪師太華無照玄鑑首座盤龍蓮峰崇照禪師般若誠禪師法嗣高仰山古梅正友禪師智者義禪師法嗣淨慈德隱普仁禪師淨慈林禪師法嗣止菴德祥禪師天界易道夷簡禪師海門則禪師法嗣辨山懶雲智安禪師華頂覩禪師法嗣福林白雲智度禪師天童一禪師法嗣徑山呆菴敬中普莊禪師壽昌源禪師法嗣天童元明原良禪師天界信禪師法嗣江心覺初慧恩禪師徑山悅禪師法嗣慈溪定水見心來復禪師靈隱明禪師法嗣淨慈休菴無旨可授禪師南嶽下第二十四世伏龍長禪師法嗣鄧尉萬峰時蔚禪師水菴無用守貴禪師松隱唯菴德然禪師清隱蘭室德馨禪師華山明叟昌菴主般若法秀禪師古梅友禪師法嗣金山慈舟濟禪師一峰寧禪師辨山安禪師法嗣祖庭空谷景隆禪師福林度禪師法嗣天界古拙俊禪師南嶽下第二十五世萬峰蔚禪師法嗣鄧尉寶藏普持禪師九峰無念勝學禪師海舟普慈禪師果林首座金山濟禪師法嗣黃龍壽昌西竺本來禪師天界俊禪師法嗣道林無際明悟禪師虎跑性天如皎禪師伏牛物外無念圓信禪師何密菴居士法嗣素庵田大士松隱然禪師法嗣道安禪師卷五十九南嶽下第二十六世鄧尉持禪師法嗣東明虗白慧旵禪師壽昌來禪師法嗣天界雪骨會中禪師東普悟禪師法嗣幻叟荊壁紹琦禪師古庭善堅禪師廣善寶月潭禪師太岡月溪澄禪師西禪雪峰瑞禪師素菴田大士法嗣佛迹菴真禪師南嶽下第二十七世東明旵禪師法嗣翼善海舟永慈禪師水心月江覺淨禪師天界中禪師法嗣君峰大闡慧通禪師投子琦禪師法嗣大雲興禪師金山寶禪師唐安湛淵奫禪師古渝濟川洪禪師海雲深禪師石經海珠祖意禪師長松大心真源禪師石經豁堂祖禪師中溪隱山昌雲禪師崇善一天智中國師三池月光常慧禪師天成古音韶禪師翠薇悟空真空禪師香巖古溪覺澄禪師玉峰如琳禪師圭菴祖玠侍者雲南堅禪師法嗣顯通大巍淨倫禪師蒼山明波羅禪師耳水道庵居士大岡澄禪師法嗣天真毒峯本善禪師普濟孤月淨澄禪師大岡夷峯寧禪師智林天淵福湛禪師廣善潭禪師法嗣護國無用文全禪師崇福大慧覺華禪師伏牛翠峯德山禪師頤菴真禪師法嗣白雲無量滄禪師和菴忠禪師法嗣福泉法海用剛宗軟禪師西禪瑞禪師法嗣棠城寶文洪印禪師性空無極聞禪師南嶽下第二十八世翼善慈禪師法嗣翼善寶峰智瑄禪師雲溪碧峯智瑛禪師夷峰寧禪師法嗣天目寶芳進禪師君峰通禪師法嗣君峰清祥上座思南正法雪光禪師天寧宣禪師法嗣徑山天才英禪師東方禪師法嗣碧峰寺天通顯禪師隆延道禪師法嗣伏牛松山西宗惟慶禪師卷五十九補遺南嶽下第二十八世東山海舟永慈禪師法嗣金陵顧智旺居士卷六十南嶽下第二十九世寶峰瑄禪師法嗣竟陵荊門天奇本瑞禪師雲溪瑛禪師法嗣林隱靜菴智素禪師寶芳進禪師法嗣東塔野翁曉禪師吉菴祚禪師法嗣法舟道濟禪師天通顯禪師法嗣月泉玉芝法聚禪師陸五臺居士壽堂松禪師法嗣斗峰古音淨琴禪師南嶽下第三十世天奇瑞禪師法嗣無聞明聰禪師濟菴大休實禪師天池素禪師法嗣大覺圓禪師野翁曉禪師法嗣無趣如空禪師無盡海禪師法嗣七尖大休宗隆禪師天寧濟禪師法嗣胥山雲谷法會禪師精巖東溪方澤禪師天池聚禪師法嗣浮峯普恩上座斗峰琴禪師法嗣斗峰天真道覺禪師大方寬禪師法嗣無礙明理禪師南嶽下第三十一世關嶺聰禪師法嗣月心笑嚴德寶禪師大用洪禪師法嗣龍樹菴寶應禪師楚峯禪師玉堂和尚敬畏空禪師法嗣車溪無幻古湛性沖禪師
